<form method="post" action="/bookTicket" style="text-align: center">

    <select id="movie" hidden>
        <option th:each="movies: ${movies}" th:value="${movies.id} * 10"></option>
    </select>
    <select style="text-align: left" name="sessionDetail">
        <option th:each="movies : ${movies}" th:text="${movies.title}" th:value="${movies.title}" id="title"
                onclick="changeValue()">Title
        </option>
    </select>
    <select style="text-align: left" id="time">
